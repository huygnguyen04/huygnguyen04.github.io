short_bio: >-
  <p>I am an 4th year undergraduate researcher in the Department of Computer Science at the 
  <a href="https://engineering.virginia.edu/department/computer-science" target="_blank" rel="noopener">University of Virginia</a>, 
  advised by <a href="https://www.cs.virginia.edu/~skadron/" target="_blank" rel="noopener">Prof. Kevin Skadron</a>, 
  where I work on modernizing the <a href="https://rodinia.cs.virginia.edu/"><strong>Rodinia Benchmark Suite</strong></a>.</p>

  <p>Previously, I conducted <strong>GPU performance and optimization</strong> research on LLM-driven CUDA optimization and MLPerf benchmarking at Insight Lab, 
  and earlier worked on <strong>GPU-accelerated molecular dynamics simulations</strong> and machine learning for materials modeling 
  with <a href="https://engineering.virginia.edu/faculty/keivan-esfarjani" target="_blank" rel="noopener">Prof. Keivan Esfarjani</a>.</p>

  <p>As Moore's Law approaches its physical limits and transistor scaling slows, future performance gains must come from 
  <strong>architectural innovation</strong> - by squeezing more useful work from every transistor on the die.</p>

  <p>This idea has drawn me toward <strong>parallel computing and hardware acceleration</strong> and motivates me to pursue a 
  <strong>Ph.D. in Computer Science</strong> at 
  <a href="https://www.cs.wisc.edu/" target="_blank" rel="noopener"><strong>University of Wisconsin–Madison</strong></a> 
  in the upcoming <strong>Fall 2026</strong>, where I will focus on <strong>GPU architecture and benchmarking</strong>.</p>

